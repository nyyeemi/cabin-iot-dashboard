services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /code/app
    command: ["fastapi", "run", "app/main.py", "--reload", "--port", "8000"]
    depends_on:
      db:
        condition: service_healthy

  hub:
    build: ./hub
    env_file:
      - ./hub/.env
    ports:
      - "8001:8001"
    develop:
      watch:
        - action: sync
          path: ./hub/app
          target: /code/app
    command: ["fastapi", "run", "app/main.py", "--reload", "--port", "8001"]
    
  db:
    image: postgres:18
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      start_period: 40s
      start_interval: 5s
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - ./backend/.env
    ports:
      - 5432:5432

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
volumes:
  db-data:
